name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            pixelplanet/picture-engraver:latest
            pixelplanet/picture-engraver:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Find container and recreate
        run: |
          CONTAINER_NAME="engraver-test"
          PORTAINER_URL="${{ secrets.PORTAINER_URL }}"
          ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}"
          API_KEY="${{ secrets.PORTAINER_API_KEY }}"

          echo "Looking up container: ${CONTAINER_NAME}"

          CONTAINERS=$(curl -sf \
            -H "X-API-Key: ${API_KEY}" \
            "${PORTAINER_URL}/api/endpoints/${ENDPOINT_ID}/docker/containers/json?all=true&filters=%7B%22name%22%3A%5B%22${CONTAINER_NAME}%22%5D%7D")

          CONTAINER_ID=$(echo "$CONTAINERS" | jq -r '.[0].Id // empty')

          if [ -z "$CONTAINER_ID" ]; then
            echo "::error::Container '${CONTAINER_NAME}' not found"
            exit 1
          fi

          echo "Found container ID: ${CONTAINER_ID:0:12}"

          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"PullImage": true}' \
            "${PORTAINER_URL}/api/docker/${ENDPOINT_ID}/containers/${CONTAINER_ID}/recreate")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully recreated ${CONTAINER_NAME} (HTTP ${HTTP_CODE})"
          else
            echo "::error::Failed to recreate container (HTTP ${HTTP_CODE})"
            cat /tmp/response.txt
            exit 1
          fi
