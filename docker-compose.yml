version: '3.8'
services:
  picture-engraver:
    build: .
    image: pixelplanet/picture-engraver:latest
    container_name: picture-engraver
    ports:
      - "3002:80"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - picture-engraver-data:/app/data
    restart: unless-stopped

volumes:
  picture-engraver-data:
